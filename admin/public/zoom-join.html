<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Zoom Meeting</title>
    <style>
      html,
      body {
        margin: 0;
        width: 100%;
        height: 100%;
        background: #1a1a1a;
        overflow: hidden;
      }
      #status {
        position: fixed;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        color: #fff;
        font-family: system-ui, sans-serif;
        font-size: 14px;
        padding: 1rem;
        text-align: center;
      }
    </style>
  </head>
  <body>
    <div id="status">Loading Zoom SDK…</div>
    <script>
      const statusEl = document.getElementById('status')
      const SDK_VERSION = '6.2.0'

      function setStatus(text) {
        statusEl.textContent = text
      }

      function notifyError(message) {
        window.parent.postMessage({ type: 'ZOOM_ERROR', message }, window.location.origin)
      }

      // Client View bundle expects React/Redux globals — load vendors first (see Zoom CDN sample).
      const VENDOR_SCRIPTS = [
        '/zoom/vendor/react.min.js',
        '/zoom/vendor/react-dom.min.js',
        '/zoom/vendor/redux.min.js',
        '/zoom/vendor/redux-thunk.min.js',
        '/zoom/vendor/lodash.min.js',
      ]

      function loadScript(src) {
        return new Promise(function (resolve, reject) {
          const script = document.createElement('script')
          script.src = src
          script.async = false
          script.onload = function () {
            resolve()
          }
          script.onerror = function () {
            reject(new Error('Failed to load script: ' + src))
          }
          document.head.appendChild(script)
        })
      }

      function loadScriptsInOrder(sources) {
        return sources.reduce(function (chain, src) {
          return chain.then(function () {
            return loadScript(src)
          })
        }, Promise.resolve())
      }

      function joinMeeting(credentials, leaveUrl) {
        if (typeof ZoomMtg === 'undefined') {
          notifyError('Zoom SDK failed to load')
          return
        }

        ZoomMtg.setZoomJSLib('https://source.zoom.us/' + SDK_VERSION + '/lib', '/av')
        ZoomMtg.preLoadWasm()
        ZoomMtg.prepareWebSDK()

        ZoomMtg.init({
          leaveUrl: leaveUrl,
          patchJsMedia: true,
          disableCORP: !window.crossOriginIsolated,
          success: function () {
            setStatus('Joining meeting…')
            var joinParams = {
              signature: credentials.sdkJwt,
              meetingNumber: credentials.meetingNumber,
              passWord: credentials.password || '',
              userName: credentials.displayName || 'Admin',
              userEmail: credentials.userEmail || '',
              success: function () {
                statusEl.style.display = 'none'
                window.parent.postMessage({ type: 'ZOOM_JOINED' }, window.location.origin)
              },
              error: function (err) {
                notifyError(String(err?.reason || err?.message || err || 'Join failed'))
              },
            }
            if (credentials.zak) {
              joinParams.zak = credentials.zak
            }
            ZoomMtg.join(joinParams)
          },
          error: function (err) {
            notifyError(String(err?.reason || err?.message || err || 'Init failed'))
          },
        })
      }

      window.addEventListener('message', function (event) {
        if (event.origin !== window.location.origin) return
        if (!event.data || event.data.type !== 'ZOOM_JOIN') return
        joinMeeting(event.data.credentials, event.data.leaveUrl)
      })

      loadScriptsInOrder(VENDOR_SCRIPTS)
        .then(function () {
          return loadScript('/zoom/zoom-meeting-6.2.0.min.js')
        })
        .then(function () {
          if (typeof ZoomMtg === 'undefined') {
            throw new Error('Zoom SDK loaded but ZoomMtg is unavailable')
          }
          setStatus('Waiting to join…')
          window.parent.postMessage({ type: 'ZOOM_READY' }, window.location.origin)
        })
        .catch(function (err) {
          setStatus('Zoom SDK failed to load')
          notifyError(err.message || 'Zoom SDK failed to load')
        })
    </script>
  </body>
</html>
