services:
  - type: web
    name: zoomcontrol-backend
    runtime: node
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PUBLIC_API_URL
        value: https://zoomcontrol.onrender.com
      - key: ZOOM_SDK_KEY
        sync: false
      - key: ZOOM_SDK_SECRET
        sync: false
      - key: MONGODB_URI
        sync: false
      - key: JWT_ACCESS_SECRET
        sync: false
      - key: JWT_CLIENT_SECRET
        sync: false
      - key: JWT_REFRESH_SECRET
        sync: false
      # Keep false in production when ZOOM_SDK_KEY/SECRET are set (see backend/docs/ZOOM_SETUP.md)
      - key: ZOOM_MOCK
        value: "false"
